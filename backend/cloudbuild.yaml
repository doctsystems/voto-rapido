steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nest-backend', './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nest-backend']

  - name: 'gcr.io/google-cloud-sdk'
    args:
      [
        'gcloud',
        'run',
        'deploy',
        'nest-backend',
        '--image',
        'gcr.io/$PROJECT_ID/nest-backend',
        '--platform',
        'managed',
        '--region',
        'us-central1',
        '--allow-unauthenticated',
      ]
