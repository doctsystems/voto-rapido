steps:
  # Paso 1: Construir la imagen del backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nest-backend', './backend']

  # Paso 2: Subir la imagen al Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nest-backend']

  # Paso 3: Desplegar en Cloud Run usando el SDK desde Docker Hub
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - "gcloud run deploy nest-backend \
      --image=gcr.io/$PROJECT_ID/nest-backend \
      --platform=managed \
      --region=us-central1 \
      --allow-unauthenticated \
      --set-env-vars DB_HOST=$_DB_HOST,DB_USERNAME=$_DB_USERNAME,DB_NAME=$_DB_NAME,DB_PASSWORD=$_DB_PASSWORD,JWT_SECRET=$_JWT_SECRET,DB_SSL=$_DB_SSL,DB_PORT=$_DB_PORT,FRONTEND_URL=$_FRONTEND_URL"

options:
  logging: CLOUD_LOGGING_ONLY
