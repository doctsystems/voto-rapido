version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voto-rapido-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: voto_rapido
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voto-rapido-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voto-rapido-web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  pgdata:
